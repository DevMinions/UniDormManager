# ============================================
# CI/CD 工作流
# 构建、测试、部署
# ============================================

name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop, dev ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master, develop, dev ]
  workflow_dispatch: {}  # 让 deploy-render 可在 Actions UI 手动触发

env:
  REGISTRY: ghcr.io
  # Docker tag 段必须全小写；github.repository 含大写时会失败，故硬编码
  BACKEND_IMAGE: devminions/unidormmanager/backend
  FRONTEND_IMAGE: devminions/unidormmanager/frontend

jobs:
  # 后端测试和构建
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./UniDormManagerServer
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
    
    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    
    - name: Download dependencies
      run: go mod download
    
    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...
    
    - name: Upload coverage
      uses: codecov/codecov-action@v6
      with:
        files: ./UniDormManagerServer/coverage.out
        flags: backend
        name: backend-coverage
    
    - name: Build
      run: |
        CGO_ENABLED=0 GOOS=linux go build \
          -ldflags="-s -w" \
          -o server main.go
    
    - name: Build Docker image
      if: github.event_name != 'pull_request'
      run: |
        docker build -t ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} .
        docker tag ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
          ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest

  # 前端测试和构建（React Web 管理端）
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./UniDormManagerWeb

    steps:
    - uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm run test:run

    - name: Build
      run: npm run build

    - name: Build Docker image
      if: github.event_name != 'pull_request'
      run: |
        docker build -t ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} .
        docker tag ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
          ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest

  # 安全扫描
  security:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    needs: [backend, frontend]
    # upload-sarif 需要写 Code Scanning 的权限
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
    - uses: actions/checkout@v6

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: 'trivy-results.sarif'

  # 发布镜像
  publish:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    needs: [backend, frontend, security]
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build and push backend
      uses: docker/build-push-action@v7
      with:
        context: ./UniDormManagerServer
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Build and push frontend
      uses: docker/build-push-action@v7
      with:
        context: ./UniDormManagerWeb
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # 部署到 Render(可选; 默认走 Render Blueprint 自动 deploy)
  #
  # 项目对外推荐的 demo 部署方式是 Render Blueprint(见根 render.yaml),
  # Render 检测到推到 main 后会自动重 deploy。如你需要在 CI 显式触发
  # Render Deploy Hook(例如部署其他 fork/分支),把下面 deploy-render job
  # 改成 if: github.ref == 'refs/heads/main' 并在 repo secrets 加
  # RENDER_DEPLOY_HOOK_URL,然后 curl 它。
  #
  # 这里保留为 workflow_dispatch 手动触发,避免 CI 链上一直挂"待跑"job。
  deploy-render:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: [publish]

    steps:
    - name: Trigger Render deploy hook
      run: |
        if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
          echo "RENDER_DEPLOY_HOOK_URL secret 未配置;跳过。"
          echo "在 Render dashboard → Service Settings → Deploy Hook 拷贝 URL,"
          echo "GitHub repo Settings → Secrets → 新增 RENDER_DEPLOY_HOOK_URL"
          exit 0
        fi
        curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
