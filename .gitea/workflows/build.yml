name: Build and Deploy

on:
  push:
    branches: [main, master, dev]

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Job 1: 检测变更的文件路径
  # ═══════════════════════════════════════════════════════════════
  detect-changes:
    runs-on: ubuntu-latest
    container:
      image: adamyu/ci-golang-builder:1.23
    outputs:
      uniapp_changed: ${{ steps.check.outputs.uniapp_changed }}
    steps:
      - name: Clone repository
        run: |
          git config --global credential.helper store
          echo "http://openclaw:${{ secrets.GIT_PASSWORD }}@192.168.1.10:8418" > ~/.git-credentials
          cd /tmp
          git clone "http://192.168.1.10:8418/adamyu/UniDormManager.git" repo
          cd repo
          echo "HEAD_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "PREV_SHA=$(git rev-parse HEAD~1)" >> $GITHUB_ENV

      - name: Check changed files
        id: check
        run: |
          cd /tmp/repo
          CHANGED_FILES=$(git diff --name-only ${{ env.PREV_SHA }} ${{ env.HEAD_SHA }})
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # 检测 UniApp 是否变更
          if echo "$CHANGED_FILES" | grep -q "^UniDormManager-UniApp/"; then
            echo "uniapp_changed=true" >> $GITHUB_OUTPUT
            echo "✅ UniApp changed"
          else
            echo "uniapp_changed=false" >> $GITHUB_OUTPUT
            echo "⏭️ UniApp unchanged"
          fi

  # ═══════════════════════════════════════════════════════════════
  # Job 2: 构建并上传小程序（仅当 UniApp 代码变更时执行）
  # ═══════════════════════════════════════════════════════════════
  build-miniprogram:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.uniapp_changed == 'true' }}
    runs-on: ubuntu-latest
    container:
      image: adamyu/ci-golang-builder:1.23
    steps:
      - name: Clone and build
        run: |
          set -e
          # 配置 git 凭证并克隆（使用内网地址）
          git config --global credential.helper store
          echo "http://openclaw:${{ secrets.GIT_PASSWORD }}@192.168.1.10:8418" > ~/.git-credentials
          cd /tmp
          git clone "http://192.168.1.10:8418/adamyu/UniDormManager.git" repo
          cd repo

          # 版本信息
          VER=$(git describe --tags --always 2>/dev/null || echo "dev")
          SHA=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%B | head -1)

          echo "Building UniApp Miniprogram: $VER ($SHA)"

          cd UniDormManager-UniApp

          # ═══ 替换前端配置 ═══
          echo "Replacing API config..."
          # 使用精确的行替换，避免引号问题
          sed -i "s|baseURL: 'https://api.yourdomain.com'|baseURL: 'https://udm.adamyu.top:20443'|g" src/utils/request.js
          echo "API baseURL updated to: https://udm.adamyu.top:20443"
          # 验证替换结果
          grep -A2 "production:" src/utils/request.js

          # ═══ 安装依赖并构建 ═══
          echo "Installing dependencies..."
          npm ci

          echo "Building mp-weixin..."
          npm run build:mp-weixin

          echo "Build completed. Checking output..."
          # 查找所有可能的输出目录
          find . -type d -name "mp-weixin" 2>/dev/null | head -5
          ls -la dist/ 2>/dev/null || echo "No dist/"
          ls -la dist/build/ 2>/dev/null || echo "No dist/build/"
          ls -la dist/build/mp-weixin/ 2>/dev/null || echo "No dist/build/mp-weixin/"

          # ═══ 上传小程序 ═══
          echo "Uploading miniprogram..."
          mkdir -p /tmp/miniprogram
          printf '%s\n' "${{ secrets.WECHAT_PRIVATE_KEY }}" > /tmp/miniprogram/private.key

          npx miniprogram-ci upload \
            --pp /tmp/repo/UniDormManager-UniApp/dist/build/mp-weixin \
            --pkp /tmp/miniprogram/private.key \
            --appid ${{ secrets.WECHAT_APPID }} \
            --uv 4.0.0 \
            --ud "$COMMIT_MSG" 2>&1
          UPLOAD_EXIT=$?

          rm -f /tmp/miniprogram/private.key

          if [ $UPLOAD_EXIT -eq 0 ]; then
            echo "✅ 小程序上传完成"
          else
            echo "⚠️ 小程序上传失败"
            exit 1
          fi
        shell: sh
