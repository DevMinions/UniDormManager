name: Build and Deploy

on:
  push:
    branches: [main, master, dev]

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Job 1: 检测变更的文件路径
  # ═══════════════════════════════════════════════════════════════
  detect-changes:
    runs-on: ubuntu-latest
    container:
      image: adamyu/ci-golang-builder:1.23
    outputs:
      uniapp_changed: ${{ steps.check.outputs.uniapp_changed }}
    steps:
      - name: Clone repository
        run: |
          git config --global credential.helper store
          echo "http://openclaw:${{ secrets.GIT_PASSWORD }}@192.168.1.10:8418" > ~/.git-credentials
          cd /tmp
          git clone "http://192.168.1.10:8418/adamyu/UniDormManager.git" repo
          cd repo
          echo "HEAD_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "PREV_SHA=$(git rev-parse HEAD~1)" >> $GITHUB_ENV

      - name: Check changed files
        id: check
        run: |
          cd /tmp/repo
          CHANGED_FILES=$(git diff --name-only ${{ env.PREV_SHA }} ${{ env.HEAD_SHA }})
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # 检测 UniApp 是否变更
          if echo "$CHANGED_FILES" | grep -q "^UniDormManager-UniApp/"; then
            echo "uniapp_changed=true" >> $GITHUB_OUTPUT
            echo "✅ UniApp changed"
          else
            echo "uniapp_changed=false" >> $GITHUB_OUTPUT
            echo "⏭️ UniApp unchanged"
          fi

  # ═══════════════════════════════════════════════════════════════
  # Job 2: 构建并上传小程序（仅当 UniApp 代码变更时执行）
  # ═══════════════════════════════════════════════════════════════
  build-miniprogram:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.uniapp_changed == 'true' }}
    runs-on: ubuntu-latest
    container:
      image: adamyu/ci-golang-builder:1.23
    steps:
      - name: Clone and build
        run: |
          set -e
          # 配置 git 凭证并克隆（使用内网地址）
          git config --global credential.helper store
          echo "http://openclaw:${{ secrets.GIT_PASSWORD }}@192.168.1.10:8418" > ~/.git-credentials
          cd /tmp
          git clone "http://192.168.1.10:8418/adamyu/UniDormManager.git" repo
          cd repo

          # 版本信息
          VER=$(git describe --tags --always 2>/dev/null || echo "dev")
          SHA=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%B | head -1)

          echo "Building UniApp Miniprogram: $VER ($SHA)"

          cd UniDormManager-UniApp

          # ═══ 替换前端配置 ═══
          echo "Replacing API config..."
          sed -i "s|baseURL: 'https://api.yourdomain.com'|baseURL: 'https://udm.adamyu.top:20443'|g" src/utils/request.js
          echo "API baseURL updated to: https://udm.adamyu.top:20443"
          grep -A2 "production:" src/utils/request.js

          # ═══ 安装依赖并构建 ═══
          echo "Installing dependencies..."
          npm ci

          echo "Building mp-weixin..."
          # 尝试使用 npx uni 命令构建
          if npx uni build --platform mp-weixin 2>&1; then
            echo "✅ uni build succeeded"
          else
            echo "⚠️ uni build failed, trying vite directly..."
            UNI_PLATFORM=mp-weixin NODE_ENV=production npx vite build --mode mp-weixin
          fi
          
          echo "Build completed."
          echo "Current dir: $(pwd)"
          ls -la dist/ 2>/dev/null || echo "No dist/"
          find dist -type d -name "*weixin*" 2>/dev/null | head -5

          # 确保输出目录存在
          if [ ! -d "dist/build/mp-weixin" ]; then
            echo "❌ 构建失败：未找到 dist/build/mp-weixin 目录"
            find dist -type d 2>/dev/null | head -20
            exit 1
          fi
          
          echo "✅ 构建输出确认:"
          ls -la dist/build/mp-weixin/

          # ═══ 上传小程序 ═══
          echo "Uploading miniprogram..."
          export PATH="$(dirname $(which node)):$PATH"
          
          mkdir -p /tmp/miniprogram
          
          # 写入私钥 - Secret 内容直接写入，保留原始格式
          cat > /tmp/miniprogram/private.key << 'EOF'
${{ secrets.WECHAT_PRIVATE_KEY }}
EOF
          
          # 验证私钥格式 - 显示完整内容用于调试
          echo "=== 私钥文件完整检查 ==="
          echo "文件大小: $(wc -c < /tmp/miniprogram/private.key) bytes"
          echo "文件行数: $(wc -l < /tmp/miniprogram/private.key) lines"
          echo "=== 私钥内容（前30行）==="
          head -30 /tmp/miniprogram/private.key
          echo "=== 私钥结束 ==="

          npx miniprogram-ci upload \
            --pp /tmp/repo/UniDormManager-UniApp/dist/build/mp-weixin \
            --pkp /tmp/miniprogram/private.key \
            --appid ${{ secrets.WECHAT_APPID }} \
            --uv 4.0.0 \
            --ud "$COMMIT_MSG" 2>&1
          UPLOAD_EXIT=$?

          rm -f /tmp/miniprogram/private.key

          if [ $UPLOAD_EXIT -eq 0 ]; then
            echo "✅ 小程序上传完成"
          else
            echo "⚠️ 小程序上传失败"
            exit 1
          fi
        shell: sh
