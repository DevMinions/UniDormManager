name: Build Miniprogram

on:
  push:
    branches: [main, master, dev]

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Job 1: 检测变更的文件路径
  # ═══════════════════════════════════════════════════════════════
  detect-changes:
    runs-on: ubuntu-latest
    container:
      image: adamyu/ci-golang-builder:1.23
    outputs:
      uniapp_changed: ${{ steps.check.outputs.uniapp_changed }}
    steps:
      - name: Clone repository
        run: |
          git config --global credential.helper store
          echo "http://openclaw:${{ secrets.GIT_PASSWORD }}@192.168.1.10:8418" > ~/.git-credentials
          cd /tmp
          git clone "http://192.168.1.10:8418/adamyu/UniDormManager.git" repo
          cd repo
          echo "HEAD_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "PREV_SHA=$(git rev-parse HEAD~1)" >> $GITHUB_ENV

      - name: Check changed files
        id: check
        run: |
          cd /tmp/repo
          CHANGED_FILES=$(git diff --name-only ${{ env.PREV_SHA }} ${{ env.HEAD_SHA }})
          echo "Changed files:"
          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -q "^UniDormManager-UniApp/"; then
            echo "uniapp_changed=true" >> $GITHUB_OUTPUT
            echo "✅ UniApp changed"
          else
            echo "uniapp_changed=false" >> $GITHUB_OUTPUT
            echo "⏭️ UniApp unchanged"
          fi

  # ═══════════════════════════════════════════════════════════════
  # Job 2: 构建小程序（输出压缩包供手动下载）
  # ═══════════════════════════════════════════════════════════════
  build-miniprogram:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.uniapp_changed == 'true' }}
    runs-on: ubuntu-latest
    container:
      image: adamyu/ci-golang-builder:1.23
    steps:
      - name: Build miniprogram
        run: |
          set -e
          git config --global credential.helper store
          echo "http://openclaw:${{ secrets.GIT_PASSWORD }}@192.168.1.10:8418" > ~/.git-credentials
          cd /tmp
          git clone "http://192.168.1.10:8418/adamyu/UniDormManager.git" repo
          cd repo

          VER=$(git describe --tags --always 2>/dev/null || echo "dev")
          SHA=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%B | head -1)
          echo "Building: $VER ($SHA)"

          cd UniDormManager-UniApp

          # 替换 API 配置
          sed -i "s|baseURL: 'https://api.yourdomain.com'|baseURL: 'https://udm.adamyu.top:20443'|g" src/utils/request.js
          echo "API baseURL updated to: https://udm.adamyu.top:20443"

          # 构建
          npm ci
          export UNI_PLATFORM=mp-weixin
          npx uni build --platform mp-weixin

          # 查找构建输出
          echo "=== 查找构建输出 ==="
          find dist -type d 2>/dev/null | head -20
          MP_WEIXIN_DIR=$(find dist -type d -name "mp-weixin" 2>/dev/null | head -1)
          if [ -z "$MP_WEIXIN_DIR" ]; then
            echo "❌ 未找到 mp-weixin 目录"
            exit 1
          fi
          echo "✅ 构建输出: $MP_WEIXIN_DIR"

          # 替换 appid（如果需要）
          if [ -n "${{ secrets.WECHAT_APPID }}" ]; then
            sed -i "s|\"appid\": \"wxXXXXXXXXXXXXXXXX\"|\"appid\": \"${{ secrets.WECHAT_APPID }}\"|g" "$MP_WEIXIN_DIR/project.config.json"
            echo "已更新 project.config.json 中的 appid"
          fi

          # 打包构建产物
          OUTPUT_NAME="miniprogram-${VER}-${SHA}.zip"
          cd "$MP_WEIXIN_DIR"
          zip -r "/tmp/$OUTPUT_NAME" .
          cd -
          
          echo ""
          echo "=========================================="
          echo "✅ 构建完成！"
          echo "=========================================="
          echo "版本: $VER ($SHA)"
          echo "提交信息: $COMMIT_MSG"
          echo "输出文件: /tmp/$OUTPUT_NAME"
          echo "文件大小: $(du -h /tmp/$OUTPUT_NAME | cut -f1)"
          echo ""
          echo "📦 手动上传步骤："
          echo "1. 下载构建产物压缩包"
          echo "2. 解压到本地目录"
          echo "3. 使用微信开发者工具打开"
          echo "4. 点击'上传'按钮"
          echo "=========================================="
          
          # 列出目录内容供确认
          ls -la "$MP_WEIXIN_DIR" | head -15
          echo ""
          echo "文件总数: $(find "$MP_WEIXIN_DIR" -type f | wc -l)"
        shell: sh
