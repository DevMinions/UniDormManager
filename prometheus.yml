global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'unidorm-monitor'

scrape_configs:
  - job_name: 'unidorm-backend'
    static_configs:
      - targets: ['backend:8080']
        labels:
          service: 'backend'
          environment: 'production'
    metrics_path: '/metrics'
    scrape_interval: 10s
