<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宿舍管理系统 - 玻璃拟态未来风</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        
        /* 动态背景 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 20s infinite ease-in-out;
        }
        
        .blob-1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            top: -100px;
            right: -100px;
        }
        
        .blob-2 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            bottom: 100px;
            left: -50px;
            animation-delay: -5s;
        }
        
        .blob-3 {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            top: 50%;
            left: 50%;
            animation-delay: -10s;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        
        /* 玻璃拟态导航 */
        .navbar {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .navbar-title {
            font-size: 18px;
            font-weight: 500;
            text-align: center;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* 主容器 */
        .container {
            padding: 20px;
            padding-bottom: 100px;
        }
        
        /* 欢迎卡片 - 玻璃拟态 */
        .welcome-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .welcome-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
        }
        
        .welcome-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
        }
        
        .welcome-name {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #c7d2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .role-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        /* 统计网格 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 24px;
        }
        
        .stat-icon.purple {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        
        .stat-icon.cyan {
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
        }
        
        .stat-icon.pink {
            background: linear-gradient(135deg, #ec4899, #f43f5e);
        }
        
        .stat-icon.orange {
            background: linear-gradient(135deg, #f59e0b, #f97316);
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }
        
        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        /* 功能菜单 */
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .menu-item {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 16px 8px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .menu-item:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.1);
        }
        
        .menu-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-size: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .menu-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        /* 公告卡片 */
        .notice-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .notice-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, #f59e0b, #f97316);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .notice-content {
            flex: 1;
        }
        
        .notice-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .notice-time {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .notice-arrow {
            color: rgba(255, 255, 255, 0.4);
            font-size: 18px;
        }
        
        /* 底部导航 */
        .tabbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
        }
        
        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .tab-item.active {
            color: #a5b4fc;
        }
        
        .tab-icon {
            font-size: 24px;
        }
        
        .tab-text {
            font-size: 11px;
        }
    </style>
</head>
<body>
    <!-- 动态背景 -->
    <div class="bg-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <!-- 导航栏 -->
    <div class="navbar">
        <div class="navbar-title">宿舍管理系统</div>
    </div>
    
    <!-- 主内容 -->
    <div class="container">
        <!-- 欢迎卡片 -->
        <div class="welcome-card">
            <div class="welcome-text">欢迎回来，</div>
            <div class="welcome-name">张明同学</div>
            <span class="role-badge">学生</span>
        </div>
        
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon purple">🏠</div>
                <div class="stat-value">3-205</div>
                <div class="stat-label">我的宿舍</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon cyan">🔧</div>
                <div class="stat-value">2</div>
                <div class="stat-label">待处理报修</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon pink">📋</div>
                <div class="stat-value">5</div>
                <div class="stat-label">本月通知</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange">⭐</div>
                <div class="stat-value">98</div>
                <div class="stat-label">宿舍评分</div>
            </div>
        </div>
        
        <!-- 功能菜单 -->
        <div class="section-title">快捷功能</div>
        <div class="menu-grid">
            <div class="menu-item">
                <div class="menu-icon">🔧</div>
                <div class="menu-text">报修</div>
            </div>
            <div class="menu-item">
                <div class="menu-icon">📅</div>
                <div class="menu-text">查寝</div>
            </div>
            <div class="menu-icon">📋</div>
                <div class="menu-text">公告</div>
            </div>
            <div class="menu-item">
                <div class="menu-icon">💬</div>
                <div class="menu-text">反馈</div>
            </div>
        </div>
        
        <!-- 最新公告 -->
        <div class="section-title">最新公告</div>
        <div class="notice-card">
            <div class="notice-icon">📢</div>
            <div class="notice-content">
                <div class="notice-title">关于期末宿舍检查的通知</div>
                <div class="notice-time">2024-12-20 14:30</div>
            </div>
            <div class="notice-arrow">›</div>
        </div>
        <div class="notice-card">
            <div class="notice-icon" style="background: linear-gradient(135deg, #667eea, #764ba2);">⚡</div>
            <div class="notice-content">
                <div class="notice-title">周末停电检修安排</div>
                <div class="notice-time">2024-12-19 09:00</div>
            </div>
            <div class="notice-arrow">›</div>
        </div>
    </div>
    
    <!-- 底部导航 -->
    <div class="tabbar">
        <div class="tab-item active">
            <span class="tab-icon">🏠</span>
            <span class="tab-text">首页</span>
        </div>
        <div class="tab-item">
            <span class="tab-icon">🚪</span>
            <span class="tab-text">房间</span>
        </div>
        <div class="tab-item">
            <span class="tab-icon">🔧</span>
            <span class="tab-text">报修</span>
        </div>
        <div class="tab-item">
            <span class="tab-icon">👤</span>
            <span class="tab-text">我的</span>
        </div>
    </div>
</body>
</html>
