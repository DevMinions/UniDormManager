<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宿舍管理系统 - 有机自然风</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=ZCOOL+XiaoWei&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: #faf9f7;
            min-height: 100vh;
            color: #3d3d3d;
            position: relative;
        }
        
        /* 纸张纹理背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.4;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: -1;
        }
        
        /* 有机形状背景装饰 */
        .organic-shape {
            position: fixed;
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            z-index: -1;
            opacity: 0.15;
        }
        
        .shape-1 {
            width: 350px;
            height: 350px;
            background: #8b9a7c;
            top: -100px;
            right: -80px;
            animation: organic 15s ease-in-out infinite;
        }
        
        .shape-2 {
            width: 280px;
            height: 280px;
            background: #c4a77d;
            bottom: 150px;
            left: -60px;
            animation: organic 12s ease-in-out infinite reverse;
        }
        
        @keyframes organic {
            0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
        }
        
        /* 导航栏 */
        .navbar {
            background: rgba(250, 249, 247, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(139, 154, 124, 0.2);
        }
        
        .navbar-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 20px;
            font-weight: 400;
            text-align: center;
            color: #5c6b52;
            letter-spacing: 2px;
        }
        
        /* 主容器 */
        .container {
            padding: 24px 20px;
            padding-bottom: 120px;
        }
        
        /* 欢迎卡片 - 手绘风格 */
        .welcome-card {
            background: #ffffff;
            border-radius: 24px 24px 24px 8px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 
                0 4px 20px rgba(139, 154, 124, 0.12),
                0 2px 8px rgba(0, 0, 0, 0.04);
            border: 2px solid #e8e4df;
            position: relative;
        }
        
        .welcome-card::after {
            content: '🌿';
            position: absolute;
            top: -12px;
            right: 20px;
            font-size: 28px;
            background: #faf9f7;
            padding: 0 8px;
        }
        
        .welcome-text {
            font-size: 14px;
            color: #8b9a7c;
            margin-bottom: 8px;
            font-weight: 400;
        }
        
        .welcome-name {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 26px;
            font-weight: 400;
            color: #3d3d3d;
            letter-spacing: 1px;
        }
        
        .role-badge {
            display: inline-block;
            background: linear-gradient(135deg, #e8ece4, #d4dcc9);
            color: #5c6b52;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 14px;
            border: 1px solid #c5d4b6;
            font-weight: 500;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }
        
        .stat-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 24px 16px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            border: 1px solid #e8e4df;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(139, 154, 124, 0.15);
        }
        
        .stat-icon {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 24px;
            border: 2px solid;
        }
        
        .stat-icon.sage {
            background: #f0f3ed;
            border-color: #8b9a7c;
        }
        
        .stat-icon.terracotta {
            background: #fdf6f0;
            border-color: #c4a77d;
        }
        
        .stat-icon.clay {
            background: #fef7f5;
            border-color: #d4a59a;
        }
        
        .stat-icon.moss {
            background: #f2f5ef;
            border-color: #a8b899;
        }
        
        .stat-value {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 26px;
            font-weight: 400;
            color: #3d3d3d;
            margin-bottom: 6px;
        }
        
        .stat-label {
            font-size: 12px;
            color: #8b8b8b;
        }
        
        /* 功能菜单 */
        .section-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 18px;
            color: #5c6b52;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #8b9a7c;
            border-radius: 2px;
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 28px;
        }
        
        .menu-item {
            background: #ffffff;
            border-radius: 16px;
            padding: 18px 8px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            border: 1px solid #e8e4df;
            transition: all 0.3s ease;
        }
        
        .menu-item:active {
            transform: scale(0.96);
            background: #f8f9f6;
        }
        
        .menu-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 22px;
            background: #f5f4f2;
            border: 1px dashed #c9c5be;
        }
        
        .menu-text {
            font-size: 12px;
            color: #5a5a5a;
            font-weight: 500;
        }
        
        /* 公告卡片 */
        .notice-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            border: 1px solid #e8e4df;
            border-left: 3px solid #c4a77d;
        }
        
        .notice-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #fdf6f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border: 1px solid #e8d5c4;
            flex-shrink: 0;
        }
        
        .notice-content {
            flex: 1;
        }
        
        .notice-title {
            font-size: 14px;
            font-weight: 500;
            color: #3d3d3d;
            margin-bottom: 6px;
            line-height: 1.4;
        }
        
        .notice-time {
            font-size: 12px;
            color: #999;
        }
        
        .notice-arrow {
            color: #b5b5b5;
            font-size: 20px;
            font-weight: 300;
        }
        
        /* 底部导航 */
        .tabbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #ffffff;
            border-top: 1px solid #e8e4df;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.04);
        }
        
        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            color: #999;
        }
        
        .tab-item.active {
            color: #5c6b52;
        }
        
        .tab-item.active .tab-icon {
            background: #e8ece4;
        }
        
        .tab-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: all 0.3s ease;
        }
        
        .tab-text {
            font-size: 11px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- 有机形状背景 -->
    <div class="organic-shape shape-1"></div>
    <div class="organic-shape shape-2"></div>
    
    <!-- 导航栏 -->
    <div class="navbar">
        <div class="navbar-title">宿舍管理系统</div>
    </div>
    
    <!-- 主内容 -->
    <div class="container">
        <!-- 欢迎卡片 -->
        <div class="welcome-card">
            <div class="welcome-text">欢迎回来，</div>
            <div class="welcome-name">张明同学</div>
            <span class="role-badge">🌱 学生</span>
        </div>
        
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon sage">🏠</div>
                <div class="stat-value">3-205</div>
                <div class="stat-label">我的宿舍</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon terracotta">🔧</div>
                <div class="stat-value">2</div>
                <div class="stat-label">待处理报修</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon clay">📋</div>
                <div class="stat-value">5</div>
                <div class="stat-label">本月通知</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon moss">⭐</div>
                <div class="stat-value">98</div>
                <div class="stat-label">宿舍评分</div>
            </div>
        </div>
        
        <!-- 功能菜单 -->
        <div class="section-title">快捷功能</div>
        <div class="menu-grid">
            <div class="menu-item">
                <div class="menu-icon">🔧</div>
                <div class="menu-text">报修</div>
            </div>
            <div class="menu-item">
                <div class="menu-icon">📅</div>
                <div class="menu-text">查寝</div>
            </div>
            <div class="menu-item">
                <div class="menu-icon">📋</div>
                <div class="menu-text">公告</div>
            </div>
            <div class="menu-item">
                <div class="menu-icon">💬</div>
                <div class="menu-text">反馈</div>
            </div>
        </div>
        
        <!-- 最新公告 -->
        <div class="section-title">最新公告</div>
        <div class="notice-card">
            <div class="notice-icon">📢</div>
            <div class="notice-content">
                <div class="notice-title">关于期末宿舍检查的通知</div>
                <div class="notice-time">2024-12-20 14:30</div>
            </div>
            <div class="notice-arrow">›</div>
        </div>
        
        <div class="notice-card" style="border-left-color: #8b9a7c;">
            <div class="notice-icon" style="background: #f0f3ed; border-color: #c5d4b6;">⚡</div>
            <div class="notice-content">
                <div class="notice-title">周末停电检修安排</div>
                <div class="notice-time">2024-12-19 09:00</div>
            </div>
            <div class="notice-arrow">›</div>
        </div>
    </div>
    
    <!-- 底部导航 -->
    <div class="tabbar">
        <div class="tab-item active">
            <span class="tab-icon">🏠</span>
            <span class="tab-text">首页</span>
        </div>
        <div class="tab-item">
            <span class="tab-icon">🚪</span>
            <span class="tab-text">房间</span>
        </div>
        <div class="tab-item">
            <span class="tab-icon">🔧</span>
            <span class="tab-text">报修</span>
        </div>
        <div class="tab-item">
            <span class="tab-icon">👤</span>
            <span class="tab-text">我的</span>
        </div>
    </div>
</body>
</html>
