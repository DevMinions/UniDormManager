<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宿舍管理系统 - 新粗野主义</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            color: #000;
            overflow-x: hidden;
        }
        
        /* 装饰性网格背景 */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }
        
        /* 导航栏 */
        .navbar {
            background: #000;
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 4px solid #000;
        }
        
        .navbar-title {
            font-family: 'Space Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        /* 主容器 */
        .container {
            padding: 24px 16px;
            padding-bottom: 120px;
        }
        
        /* 欢迎卡片 - 粗野主义 */
        .welcome-card {
            background: #fff;
            border: 4px solid #000;
            padding: 24px;
            margin-bottom: 24px;
            position: relative;
            box-shadow: 8px 8px 0 #000;
        }
        
        .welcome-card::before {
            content: '';
            position: absolute;
            top: -4px;
            right: -4px;
            width: 20px;
            height: 20px;
            background: #ff006e;
            border: 4px solid #000;
        }
        
        .welcome-text {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .welcome-name {
            font-size: 32px;
            font-weight: 900;
            color: #000;
            line-height: 1.2;
            letter-spacing: -1px;
        }
        
        .role-badge {
            display: inline-block;
            background: #ff006e;
            color: #fff;
            padding: 6px 16px;
            margin-top: 16px;
            border: 3px solid #000;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 3px 3px 0 #000;
        }
        
        /* 统计网格 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }
        
        .stat-card {
            background: #fff;
            border: 3px solid #000;
            padding: 20px;
            text-align: center;
            box-shadow: 6px 6px 0 #000;
            transition: all 0.1s ease;
        }
        
        .stat-card:active {
            transform: translate(3px, 3px);
            box-shadow: 3px 3px 0 #000;
        }
        
        .stat-card:nth-child(1) { background: #fff; }
        .stat-card:nth-child(2) { background: #fb5607; }
        .stat-card:nth-child(3) { background: #ffbe0b; }
        .stat-card:nth-child(4) { background: #8338ec; }
        
        .stat-card:nth-child(2) .stat-value,
        .stat-card:nth-child(3) .stat-value,
        .stat-card:nth-child(4) .stat-value {
            color: #fff;
            -webkit-text-stroke: 2px #000;
        }
        
        .stat-icon {
            font-size: 32px;
            margin-bottom: 12px;
            display: block;
        }
        
        .stat-value {
            font-family: 'Space Mono', monospace;
            font-size: 28px;
            font-weight: 700;
            color: #000;
            margin-bottom: 4px;
            letter-spacing: -1px;
        }
        
        .stat-label {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: #000;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-card:nth-child(2) .stat-label,
        .stat-card:nth-child(3) .stat-label,
        .stat-card:nth-child(4) .stat-label {
            color: #fff;
            font-weight: 700;
        }
        
        /* 功能菜单 */
        .section-title {
            font-size: 18px;
            font-weight: 900;
            margin-bottom: 20px;
            color: #000;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 4px solid #000;
            padding-bottom: 8px;
            display: inline-block;
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 28px;
        }
        
        .menu-item {
            background: #fff;
            border: 3px solid #000;
            padding: 16px 4px;
            text-align: center;
            box-shadow: 4px 4px 0 #000;
            transition: all 0.1s ease;
            cursor: pointer;
        }
        
        .menu-item:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #000;
        }
        
        .menu-item:nth-child(1) { background: #3a86ff; }
        .menu-item:nth-child(2) { background: #ff006e; }
        .menu-item:nth-child(3) { background: #8338ec; }
        .menu-item:nth-child(4) { background: #06ffa5; }
        
        .menu-icon {
            font-size: 28px;
            margin-bottom: 8px;
            display: block;
        }
        
        .menu-text {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            font-weight: 700;
            color: #000;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* 公告卡片 */
        .notice-card {
            background: #fff;
            border: 3px solid #000;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 5px 5px 0 #000;
        }
        
        .notice-card:nth-child(odd) {
            background: #fff;
        }
        
        .notice-icon {
            width: 50px;
            height: 50px;
            background: #ffbe0b;
            border: 3px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            box-shadow: 3px 3px 0 #000;
        }
        
        .notice-content {
            flex: 1;
        }
        
        .notice-title {
            font-size: 14px;
            font-weight: 700;
            color: #000;
            margin-bottom: 6px;
            line-height: 1.3;
        }
        
        .notice-time {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .notice-arrow {
            font-family: 'Space Mono', monospace;
            color: #000;
            font-size: 24px;
            font-weight: 700;
        }
        
        /* 底部导航 */
        .tabbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #000;
            border-top: 4px solid #000;
            display: flex;
            justify-content: space-around;
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
        }
        
        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            color: #666;
        }
        
        .tab-item.active {
            color: #ff006e;
        }
        
        .tab-icon {
            font-size: 24px;
            background: #fff;
            border: 2px solid #fff;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .tab-item.active .tab-icon {
            background: #ff006e;
            border-color: #ff006e;
        }
        
        .tab-text {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
        }
        
        /* 装饰元素 */
        .deco-stripe {
            height: 8px;
            background: repeating-linear-gradient(
                90deg,
                #000 0px,
                #000 20px,
                #ff006e 20px,
                #ff006e 40px,
                #ffbe0b 40px,
                #ffbe0b 60px,
                #06ffa5 60px,
                #06ffa5 80px
            );
            border-top: 3px solid #000;
            border-bottom: 3px solid #000;
        }
    </style>
</head>
<body>
    <!-- 网格背景 -->
    <div class="grid-bg"></div>
    
    <!-- 装饰条 -->
    <div class="deco-stripe"></div>
    
    <!-- 导航栏 -->
    <div class="navbar">
        <div class="navbar-title">宿舍管理系统</div>
    </div>
    
    <!-- 主内容 -->
    <div class="container">
        <!-- 欢迎卡片 -->
        <div class="welcome-card">
            <div class="welcome-text">WELCOME BACK,</div>
            <div class="welcome-name">张明同学</div>
            <span class="role-badge">STUDENT</span>
        </div>
        
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-icon">🏠</span>
                <div class="stat-value">3-205</div>
                <div class="stat-label">我的宿舍</div>
            </div>
            <div class="stat-card">
                <span class="stat-icon">🔧</span>
                <div class="stat-value">2</div>
                <div class="stat-label">待处理报修</div>
            </div>
            <div class="stat-card">
                <span class="stat-icon">📋</span>
                <div class="stat-value">5</div>
                <div class="stat-label">本月通知</div>
            </div>
            <div class="stat-card">
                <span class="stat-icon">⭐</span>
                <div class="stat-value">98</div>
                <div class="stat-label">宿舍评分</div>
            </div>
        </div>
        
        <!-- 功能菜单 -->
        <div class="section-title">快捷功能</div>
        <div class="menu-grid">
            <div class="menu-item">
                <span class="menu-icon">🔧</span>
                <div class="menu-text">报修</div>
            </div>
            <div class="menu-item">
                <span class="menu-icon">📅</span>
                <div class="menu-text">查寝</div>
            </div>
            <div class="menu-item">
                <span class="menu-icon">📋</span>
                <div class="menu-text">公告</div>
            </div>
            <div class="menu-item">
                <span class="menu-icon">💬</span>
                <div class="menu-text">反馈</div>
            </div>
        </div>
        
        <!-- 最新公告 -->
        <div class="section-title">最新公告</div>
        <div class="notice-card">
            <div class="notice-icon">📢</div>
            <div class="notice-content">
                <div class="notice-title">关于期末宿舍检查的通知</div>
                <div class="notice-time">2024-12-20 14:30</div>
            </div>
            <div class="notice-arrow">→</div>
        </div>
        
        <div class="notice-card">
            <div class="notice-icon" style="background: #06ffa5;">⚡</div>
            <div class="notice-content">
                <div class="notice-title">周末停电检修安排</div>
                <div class="notice-time">2024-12-19 09:00</div>
            </div>
            <div class="notice-arrow">→</div>
        </div>
    </div>
    
    <!-- 底部导航 -->
    <div class="tabbar">
        <div class="tab-item active">
            <span class="tab-icon">🏠</span>
            <span class="tab-text">首页</span>
        </div>
        <div class="tab-item">
            <span class="tab-icon">🚪</span>
            <span class="tab-text">房间</span>
        </div>
        <div class="tab-item">
            <span class="tab-icon">🔧</span>
            <span class="tab-text">报修</span>
        </div>
        <div class="tab-item">
            <span class="tab-icon">👤</span>
            <span class="tab-text">我的</span>
        </div>
    </div>
</body>
</html>
