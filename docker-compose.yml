# ============================================
# Docker Compose 配置
# 一键启动整个应用栈（PostgreSQL + Redis + 后端 + 前端）
# ============================================

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: unidorm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-unidorm}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - unidorm_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-unidorm}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: unidorm_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - unidorm_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # 后端服务
  backend:
    build:
      context: ./UniDormManagerServer
      dockerfile: Dockerfile
    container_name: unidorm_backend
    restart: unless-stopped
    environment:
      # 数据库配置（指向同网络的 postgres 服务）
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-unidorm}
      DB_SSLMODE: disable

      # Redis 配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_pass}
      USE_CACHE: ${USE_CACHE:-true}

      # 应用配置
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: 8080
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-please_change_me_min_32_chars_for_production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # 可选：固定初始 admin 密码；不设置时后端首启会生成随机密码并打印到日志
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - unidorm_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端服务（React Web 管理端）
  frontend:
    build:
      context: ./UniDormManagerWeb
      dockerfile: Dockerfile
    container_name: unidorm_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - unidorm_network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx 反向代理（可选，用于生产环境）
  nginx:
    image: nginx:alpine
    container_name: unidorm_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - unidorm_network
    depends_on:
      - frontend
      - backend
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  unidorm_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
